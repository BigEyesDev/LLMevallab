pipeline:
  target_language: "en"
  max_document_length: 30000      # chars — safety-net fallback only; per-task limits below take precedence
  batch_size: 5                   # deprecated — use max_concurrent_documents
  max_concurrent_documents: 5
  skip_extraction: false          # summarisation only; ignored for translation
  save_raw_llm_output: true       # useful for debugging

  # Per-task hard caps (chars) — act as a safety net for unexpectedly large documents only.
  # Set well above the longest docs in the benchmark datasets so nothing is truncated
  # in normal use. Raise further if you add a dataset with longer documents.
  #   EuroParl translation:  longest doc ≈ 5,000 chars  → cap at 15,000
  #   CNN/DailyMail summary: longest doc ≈ 20,000 chars → cap at 30,000
  max_document_length_per_task:
    translation: 15000
    summarisation: 30000
    full: 15000

benchmark:
  max_concurrent_models: 3

models:
  default: "gemini-2.5-flash"

  catalog:
    # ── Tier 1: Direct provider APIs ────────────────────────────────────────
    gemini-2.5-flash:
      provider_type: gemini
      model_id: "gemini-2.5-flash"
      api_key_env: GEMINI_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      timeout_seconds: 30
      pricing:
        input_per_1m: 0.075   # Google AI pricing (Jul 2026)
        output_per_1m: 0.30

    claude-sonnet-4-6:
      provider_type: claude
      model_id: "claude-sonnet-4-6"
      api_key_env: ANTHROPIC_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      pricing:
        input_per_1m: 3.00    # Anthropic pricing (Jul 2026)
        output_per_1m: 15.00

    gpt-4o-mini:
      provider_type: openai_compatible
      model_id: "gpt-4o-mini"
      base_url: null
      api_key_env: OPENAI_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      pricing:
        input_per_1m: 0.15    # OpenAI pricing (Jul 2026)
        output_per_1m: 0.60

    # ── Tier 2: OpenRouter — top models by quality/cost/reach (Jul 2026) ───
    # Pricing verified on openrouter.ai, Jul 2026. All use OPENROUTER_API_KEY.

    deepseek-v4-flash:
      # DeepSeek V4 Flash (Apr 2026) — 284B/13B active MoE, 1M context.
      # Pareto-best price/performance: ~79% SWE-bench Verified at lowest cost.
      # Text-only; first-party API routes via China (data retention applies).
      provider_type: openai_compatible
      model_id: "deepseek/deepseek-v4-flash"
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      pricing:
        input_per_1m: 0.054   # openrouter live: $0.054/1M in
        output_per_1m: 0.242  # openrouter live: $0.242/1M out

    deepseek-v4-pro:
      # DeepSeek V4 Pro (Apr 2026) — 1.6T/49B active MoE, 1M context.
      # Top open-weights coding score (80.6% SWE-bench Verified).
      # Text-only. Use when marginal quality over Flash is worth ~8x output cost.
      provider_type: openai_compatible
      model_id: "deepseek/deepseek-v4-pro"
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      pricing:
        input_per_1m: 0.435   # openrouter live: $0.435/1M in
        output_per_1m: 0.87   # openrouter live: $0.870/1M out

    glm-5.2:
      # GLM 5.2 (Z.ai / Zhipu, Jun 2026) — MIT licensed, 1M context.
      # #1 open-weight on Artificial Analysis Intelligence Index v4.1 (score 51).
      # Best open drop-in for Opus-style long-horizon planning and agentic coding.
      # Text-only; can be token-hungry on reasoning-heavy tasks.
      provider_type: openai_compatible
      model_id: "z-ai/glm-5.2"
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      pricing:
        input_per_1m: 0.447   # openrouter live: $0.447/1M in
        output_per_1m: 3.31   # openrouter live: $3.31/1M out

    minimax-m3:
      # MiniMax M3 (MiniMax, May 2026) — 428B/23B active MoE, 1M context.
      # Native image + video input; best open multimodal + long-context model.
      # MiniMax Sparse Attention (MSA) cuts compute ~20x vs prior gen at 1M tokens.
      # Not MIT licensed — commercial use needs attribution/prior authorization at scale.
      provider_type: openai_compatible
      model_id: "minimax/minimax-m3"
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      pricing:
        input_per_1m: 0.30    # openrouter live: $0.30/1M in
        output_per_1m: 1.20   # openrouter live: $1.20/1M out

    kimi-k2.6:
      # Kimi K2.6 (Moonshot AI, Apr 2026) — 262K context, multimodal.
      # Agentic specialist: multi-agent orchestration, UI/UX generation, long-horizon coding.
      # Agent swarm architecture scales to hundreds of parallel sub-agents.
      provider_type: openai_compatible
      model_id: "moonshotai/kimi-k2.6"
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      pricing:
        input_per_1m: 0.66    # openrouter live: $0.66/1M in
        output_per_1m: 3.41   # openrouter live: $3.41/1M out

    nemotron-3-ultra:
      # NVIDIA Nemotron 3 Ultra (Jun 2026) — 550B/55B active hybrid Mamba-2+Transformer MoE.
      # 1M context, OpenMDW license, #2 open-weight on AA Index (score 48).
      # Best U.S.-built open-weight option; NVIDIA stack + enterprise-grade deployment.
      # Also available at :free route (lower SLA) for testing.
      provider_type: openai_compatible
      model_id: "nvidia/nemotron-3-ultra-550b-a55b"
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      pricing:
        input_per_1m: 0.50    # openrouter live: $0.50/1M in
        output_per_1m: 2.20   # openrouter live: $2.20/1M out

    qwen3.7-plus:
      # Qwen3.7 Plus (Alibaba, Jun 2026) — multimodal (text + image), 1M context.
      # Hybrid architecture; strong multilingual, agentic coding, GUI navigation.
      # Cost-effective mid-tier option in the Qwen3.7 family.
      provider_type: openai_compatible
      model_id: "qwen/qwen3.7-plus"
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      pricing:
        input_per_1m: 0.32    # openrouter live: $0.32/1M in
        output_per_1m: 1.28   # openrouter live: $1.28/1M out

# ─── Datasets ──────────────────────────────────────────────────────
# sample_size controls how many docs download_and_prepare() saves.
# processed_path is derived automatically — change sample_size, re-run python main.py.
datasets:

  europarl:
    purpose: "translation_evaluation"
    hf_name: "Helsinki-NLP/europarl"
    language_pair: "de-en"
    sample_size: 20
    ground_truth_key: "reference_translation"

  cnn_dailymail:
    purpose: "summarisation_evaluation"
    hf_name: "abisee/cnn_dailymail"
    version: "3.0.0"
    split: "test"
    sample_size: 20
    ground_truth_key: "reference_summary"

evaluation:
  max_concurrent_judge_calls: 5
  provider_limits:
    gemini: 10
    claude: 5
    openai_compatible: 8
  metrics:
    translation:
      - bleu
      - bertscore
      - comet
    summarisation:
      - rouge
      - bertscore
      - llm_judge
  bertscore_model: "microsoft/deberta-base"
  comet_model: "Unbabel/wmt22-comet-da"
  judge_model: "gpt-4o-mini"
  output_path: "outputs/results/"

paths:
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  outputs: "outputs/results/"
  reports: "outputs/reports/"
