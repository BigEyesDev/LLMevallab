pipeline:
  target_language: "en"
  max_document_length: 2000       # chars — truncate longer docs for cost control
  batch_size: 5                   # documents per run
  save_raw_llm_output: true       # useful for debugging

models:
  default: "gemini"

  gemini:
    model_id: "gemini-2.5-flash"
    temperature: 0.1              # low temp = more deterministic, better for extraction
    max_output_tokens: 2048
    timeout_seconds: 30

  claude:                         # Phase 2
    model_id: "claude-sonnet-4-6"
    temperature: 0.1
    max_output_tokens: 2048

  openai:                         # Phase 2
    model_id: "gpt-4o"
    temperature: 0.1
    max_output_tokens: 2048

# ─── Datasets ──────────────────────────────────────────────────────
# Two datasets, two purposes — each matched to the task it benchmarks best
datasets:

  europarl:
    purpose: "translation_evaluation"
    hf_name: "Helsinki-NLP/europarl"
    language_pair: "de-en"
    sample_size: 20
    processed_path: "data/processed/europarl/europarl_20docs.json"
    ground_truth_key: "reference_translation"   # key inside metadata{}

  cnn_dailymail:
    purpose: "summarisation_evaluation"
    hf_name: "abisee/cnn_dailymail"
    version: "3.0.0"
    split: "test"
    sample_size: 20
    processed_path: "data/processed/cnn_dailymail/cnn_dailymail_20docs.json"
    ground_truth_key: "reference_summary"       # key inside metadata{}

evaluation:
  metrics:
    translation:                  # metrics applied to translation outputs
      - bleu
      - bertscore
    summarisation:                # metrics applied to summarisation outputs
      - rouge
      - bertscore
  bertscore_model: "microsoft/deberta-xlarge-mnli"
  output_path: "outputs/results/"

paths:
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  outputs: "outputs/results/"