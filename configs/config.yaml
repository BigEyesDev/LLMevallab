      model_id: "google/gemma-3-27b-it"
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      pricing:
        input_per_1m: 0.08    # openrouter live: $0.08/1M in
        output_per_1m: 0.16   # openrouter live: $0.16/1M out

# ─── Datasets ──────────────────────────────────────────────────────
# sample_size controls how many docs download_and_prepare() saves.
# processed_path is derived automatically — change sample_size, re-run python main.py.
datasets:

  europarl:
    purpose: "translation_evaluation"
    hf_name: "Helsinki-NLP/europarl"
    language_pair: "de-en"
    sample_size: 20
    ground_truth_key: "reference_translation"

  cnn_dailymail:
    purpose: "summarisation_evaluation"
    hf_name: "abisee/cnn_dailymail"
    version: "3.0.0"
    split: "test"
    sample_size: 20
    ground_truth_key: "reference_summary"

evaluation:
  max_concurrent_judge_calls: 5
  provider_limits:
    gemini: 10
    claude: 5
    openai_compatible: 8
  metrics:
    translation:
      - bleu
      - bertscore
      - comet
    summarisation:
      - rouge
      - bertscore
      - llm_judge
  bertscore_model: "microsoft/deberta-base"
  comet_model: "Unbabel/wmt22-comet-da"
  judge_model: "gpt-4o-mini"
  output_path: "outputs/results/"

paths:
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  outputs: "outputs/results/"
  reports: "outputs/reports/"
