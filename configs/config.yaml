pipeline:
  target_language: "en"
  max_document_length: 2000       # chars — default truncation limit (overridden per task below)
  batch_size: 5                   # documents per run
  save_raw_llm_output: true       # useful for debugging

  # Per-task truncation limits (chars).
  # Translation documents are short EU parliament sentences; 2000 chars is plenty.
  # Summarisation documents are full news articles; 8000 chars preserves enough context
  # for ROUGE/BERTScore to be meaningful while keeping API costs predictable.
  max_document_length_per_task:
    translation: 2000
    summarisation: 8000
    full: 4000

models:
  default: "gemini-2.5-flash"

  catalog:
    gemini-2.5-flash:
      provider_type: gemini
      model_id: "gemini-2.5-flash"
      api_key_env: GEMINI_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      timeout_seconds: 30
      pricing:
        input_per_1m: 0.075
        output_per_1m: 0.30

    claude-sonnet-4-6:
      provider_type: claude
      model_id: "claude-sonnet-4-6"
      api_key_env: ANTHROPIC_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      pricing:
        input_per_1m: 3.00
        output_per_1m: 15.00

    gpt-4o-mini:
      provider_type: openai_compatible
      model_id: "gpt-4o-mini"
      base_url: null
      api_key_env: OPENAI_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      pricing:
        input_per_1m: 0.15
        output_per_1m: 0.60

    llama-3.3-70b:
      provider_type: openai_compatible
      model_id: "meta-llama/llama-3.3-70b-instruct"
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      pricing:
        input_per_1m: 0.13
        output_per_1m: 0.40

    deepseek-v3:
      provider_type: openai_compatible
      model_id: "deepseek/deepseek-chat"
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.1
      max_output_tokens: 2048
      pricing:
        input_per_1m: 0.14
        output_per_1m: 0.28

# ─── Datasets ──────────────────────────────────────────────────────
# sample_size controls how many docs download_and_prepare() saves.
# processed_path is derived automatically — change sample_size, re-run python main.py.
datasets:

  europarl:
    purpose: "translation_evaluation"
    hf_name: "Helsinki-NLP/europarl"
    language_pair: "de-en"
    sample_size: 20
    ground_truth_key: "reference_translation"

  cnn_dailymail:
    purpose: "summarisation_evaluation"
    hf_name: "abisee/cnn_dailymail"
    version: "3.0.0"
    split: "test"
    sample_size: 20
    ground_truth_key: "reference_summary"

evaluation:
  metrics:
    translation:
      - bleu
      - bertscore
    summarisation:
      - rouge
      - bertscore
  bertscore_model: "microsoft/deberta-base"
  output_path: "outputs/results/"

paths:
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  outputs: "outputs/results/"
  reports: "outputs/reports/"
